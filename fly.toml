# fly.toml app configuration file generated for matercula on 2026-05-14T19:32:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'matercula'
primary_region = 'fra'

[build]

[deploy]
  release_command = 'sh -c "node scripts/migrate.mjs && pnpm tsx scripts/seed-curriculum.ts"'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
