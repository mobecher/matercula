name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: matercula
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d matercula"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/matercula
      AUTH_BASE_URL: http://127.0.0.1:3000
      AUTH_SECRET: ci-secret
      EMAIL_FROM: noreply@example.com
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: eu-central-1
      S3_BUCKET: matercula
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      S3_FORCE_PATH_STYLE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate migration
        run: pnpm db:generate
      - name: Migrate
        run: pnpm db:migrate
      - name: Seed
        run: pnpm seed
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E smoke
        run: pnpm test:e2e
