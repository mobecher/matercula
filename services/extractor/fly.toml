app = 'matercula-extractor'
primary_region = 'fra'

# Internal-only service. Reachable only from inside the org via the
# Fly proxy at http://matercula-extractor.flycast:8000 (private flycast
# IPv6, allocated via `flyctl ips allocate-v6 --private`).
#
# Direct 6PN access via .internal still works, but DOES NOT trigger
# `auto_start_machines` — once the machine auto-stops, .internal callers
# get `fetch failed` until something else wakes it. Always go through
# .flycast so the proxy can wake stopped machines on demand.

[build]
  dockerfile = 'Dockerfile'

[[services]]
  internal_port = 8000
  protocol = 'tcp'
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  # `ports` IS required for flycast. Without it the Fly proxy has no
  # listener and TCP connections to the flycast IP get RST immediately.
  # `handlers = []` keeps it raw TCP — no TLS termination, since this
  # is private traffic only. The same port is exposed to the public
  # proxy too, but no public IPs are allocated, so no external traffic
  # can reach it (verify with `flyctl ips list -a matercula-extractor`).
  [[services.ports]]
    port = 8000
    handlers = []

  [[services.http_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '20s'
    method = 'get'
    path = '/health'
    protocol = 'http'

  [services.concurrency]
    type = 'requests'
    soft_limit = 5
    hard_limit = 10

[[vm]]
  # Extraction with `unstructured` is memory-hungry on large PDFs.
  # 1 GB is a starting point; bump to 2 GB if OOMs appear under real load.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  MAX_FILE_MB = '32'
