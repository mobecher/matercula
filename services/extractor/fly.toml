app = 'matercula-extractor'
primary_region = 'fra'

# Internal-only service. Never publicly exposed; reachable from the
# `matercula-worker` app via the Fly private network at
# http://matercula-extractor.internal:8000

[build]
  dockerfile = 'Dockerfile'

# Note: NO [http_service] section — that would allocate a public IP and
# proxy the service to the internet. The service must remain on 6PN only.
# The internal port is opened via [[services]] with no `ports` block.

[[services]]
  internal_port = 8000
  protocol = 'tcp'
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  # No `ports = [...]` block on purpose — without it the proxy does not
  # publish anything on the public edge. Internal callers reach the VM
  # directly on `internal_port` over the .internal address.

  [[services.http_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '20s'
    method = 'get'
    path = '/health'
    protocol = 'http'

  [services.concurrency]
    type = 'requests'
    soft_limit = 5
    hard_limit = 10

[[vm]]
  # Extraction with `unstructured` is memory-hungry on large PDFs.
  # 1 GB is a starting point; bump to 2 GB if OOMs appear under real load.
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[env]
  MAX_FILE_MB = '32'
