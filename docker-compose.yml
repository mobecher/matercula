services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: matercula
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d matercula"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    networks:
      app_net:
        ipv4_address: 172.28.0.2

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - minio_data:/data
    networks:
      app_net:
        ipv4_address: 172.28.0.3

  # Legt den Bucket beim Start an (idempotent). Beendet sich danach.
  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://172.28.0.3:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/matercula &&
      echo 'bucket ready'
      "
    networks:
      - app_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@172.28.0.2:5432/matercula
      AUTH_BASE_URL: http://localhost:3000
      AUTH_SECRET: local-dev-secret-change-me
      EMAIL_FROM: noreply@example.com
      S3_ENDPOINT: http://172.28.0.3:9000
      S3_REGION: eu-central-1
      S3_BUCKET: matercula
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      AI_TAGGING_PROVIDER: openai
      AI_TAGGING_MODEL: gpt-4o-mini
      AI_CHAT_PROVIDER: openai
      AI_CHAT_MODEL: gpt-4o-mini
      AI_EMBEDDING_PROVIDER: openai
      AI_EMBEDDING_MODEL: text-embedding-3-small
    ports:
      - "3000:3000"
    networks:
      app_net:
        ipv4_address: 172.28.0.4

volumes:
  postgres_data:
  minio_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
