app = 'matercula-worker'
primary_region = 'fra'

# Long-running pg-boss worker process. No HTTP service — it pulls jobs.

[build]
  dockerfile = 'Dockerfile'

[processes]
  worker = 'pnpm worker'

[env]
  # IMPORTANT: must use `.flycast` (Fly proxy), not `.internal` (direct 6PN).
  # `.internal` connects straight to the machine and does NOT trigger
  # `auto_start_machines` on the extractor app — when the extractor is
  # auto-stopped (no recent traffic) the request just fails with
  # `fetch failed`. `.flycast` goes through the Fly proxy, which wakes a
  # stopped machine on demand. See services/extractor/fly.toml.
  EXTRACTOR_URL = 'http://matercula-extractor.flycast:8000'
  EXTRACTOR_TIMEOUT_MS = '120000'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  processes = ['worker']
